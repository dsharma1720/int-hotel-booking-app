<template>

<lightning-card title="Login">

<div class="slds-p-around_medium">

<lightning-input
type="email"
label="Email"
data-field="email"
required
onchange={handleChange}>
</lightning-input>

<lightning-input
type="password"
label="Password"
data-field="password"
required
onchange={handleChange}>
</lightning-input>

<br/>

<lightning-button
label="Login"
variant="brand"
onclick={handleLogin}>
</lightning-button>

</div>

</lightning-card>

</template>
