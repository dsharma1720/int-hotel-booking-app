<template>
    <c-header-component></c-header-component>
    <lightning-card title="Hotel Lists">

        <div class="slds-p-around_medium">
 <div class="auth-buttons slds-m-bottom_medium">

   

    </div>
        
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    label="Select City"
                    value={city}
                    options={cityOptions}
                    onchange={handleCityChange}>
                </lightning-combobox>
            </div>

     
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading hotels"></lightning-spinner>
            </template>

      
            <template if:true={error}>
                <div class="slds-text-color_error">{error}</div>
            </template>

         
            <template if:true={hotels}>
                <template if:true={hotels.length}>

                    <form>

                        <template for:each={hotels} for:item="hotel" for:index="index">

                           

                                     <div key={hotel.Id}
                                          class="hotel-card slds-m-bottom_medium"
                                          data-id={hotel.Id}
                                          onclick={handleSelect}>





                               <div class="hotel-info">

                                        
                                              <h2 class="hotel-name">{hotel.Hotel_Name__c}</h2>

                                   
                                                <div class="hotel-location">
                                                    {hotel.Hotel_City__c} — {hotel.Hotel_Type__c}
                                                </div>

                                               <div class="hotel-rating">
                                                   ⭐ {hotel.Hotel_Rating__c}
                                               </div>

                                             
                                                <div class="hotel-price">
                                                    <lightning-formatted-number
                                                        value={hotel.Per_Day_Cost__c}
                                                        format-style="currency"
                                                        currency-code="INR">
                                                    </lightning-formatted-number>
                                                     <span class="price-text"> / night</span>
                                                </div>

                                              
                                                <div class="slds-m-top_small">

                                                    <span>
                                                        WiFi:
                                                        <template if:true={hotel.WiFi_Availability__c}>Yes</template>
                                                        <template if:false={hotel.WiFi_Availability__c}>No</template>
                                                    </span>

                                                    <span class="slds-p-left_medium">
                                                        Cash Pay:
                                                        <template if:true={hotel.Cash_Pay_Availability__c}>Yes</template>
                                                        <template if:false={hotel.Cash_Pay_Availability__c}>No</template>
                                                    </span>

                                                    <span class="slds-p-left_medium">
                                                        Cancellation:
                                                        <template if:true={hotel.Cancellation_Availability__c}>Yes</template>
                                                        <template if:false={hotel.Cancellation_Availability__c}>No</template>
                                                    </span>

                                                </div>

                                            </div>

                                </div>

                            

                             

                               

                            </div>

                        </template>

                    </form>

                  

                </template>

                <template if:false={hotels.length}>
                    <div>No hotels found.</div>
                </template>

            </template>

        </div>

    </lightning-card>
</template>
