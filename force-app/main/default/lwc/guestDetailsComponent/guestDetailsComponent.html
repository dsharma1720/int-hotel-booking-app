<template>
    <c-header-component></c-header-component>
    <lightning-card title="Guest Form Details">

        <div class="slds-p-around_medium">

            <lightning-input
    label="Selected Hotel"
    value={hotelName}
    disabled>
</lightning-input>

            <lightning-input label="First Name"
                data-field="firstName"
                onchange={handleChange} required>
            </lightning-input>

            <lightning-input label="Last Name"
                data-field="lastName"
                onchange={handleChange} required>
            </lightning-input>

            <lightning-input type="tel" label="Phone"
                data-field="phone"
                onchange={handleChange} required>
            </lightning-input>

            <lightning-input type="email" label="Email"
                data-field="email"
                onchange={handleChange} required>
            </lightning-input>

            <lightning-input type="number" label="Adults"
                data-field="adults"
                value={adults}
                  min="0"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input type="number" label="Children"
                data-field="children"
                value={children}
                  min="0"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input type="date" label="Check-In Date"
                data-field="checkIn"
                min={todayDate}
                onchange={handleChange} required>
            </lightning-input>

            <lightning-input type="date" label="Check-Out Date"
                data-field="checkOut"
                onchange={handleChange} required>
            </lightning-input>
            <template if:true={dateError}>
    <div class="slds-text-color_error slds-text-body_small">
        {dateError}
    </div>
</template>

            <lightning-input
                label="Hotel City"
                
                data-field="city"
                options={cityOptions}
                value={city}
                disabled>
            </lightning-input>

            <lightning-input
                label="Hotel Type"
               
                data-field="hotelType"
                options={hotelOptions}
                value={hotelType}
               disabled>
            </lightning-input>


            <br/>

            <lightning-button label="Next"
                variant="brand"
                onclick={handleNext}>
            </lightning-button>

        </div>

    </lightning-card>
</template>
